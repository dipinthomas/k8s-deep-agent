# IRSA-bound ServiceAccounts. The role-arn annotations are populated from
# the demo-workload CFN stack outputs by demo/deploy-k8s.sh — this file is
# rendered through `envsubst` before `kubectl apply`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: latency-synthesizer
  namespace: shop-prod
  annotations:
    eks.amazonaws.com/role-arn: ${SYNTHESIZER_IRSA_ROLE_ARN}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adot-collector
  namespace: shop-prod
  annotations:
    eks.amazonaws.com/role-arn: ${COLLECTOR_IRSA_ROLE_ARN}
