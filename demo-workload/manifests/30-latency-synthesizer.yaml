# Synthesizer Deployment with ADOT collector sidecar. The synth process
# emits OTLP to localhost:4317 and the sidecar exports to X-Ray.
#
# Image is rendered by demo/deploy-k8s.sh via envsubst:
#   ${SYNTHESIZER_IMAGE} - e.g. dipinthomas2003/latency-synthesizer:v1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: latency-synthesizer
  namespace: shop-prod
  labels:
    app: latency-synthesizer
spec:
  replicas: 1
  strategy:
    type: Recreate          # single replica, no rolling update needed
  selector:
    matchLabels:
      app: latency-synthesizer
  template:
    metadata:
      labels:
        app: latency-synthesizer
    spec:
      serviceAccountName: latency-synthesizer
      # Prefer a node that doesn't host the k8s-agent pod so that the
      # stress pod (which co-locates with the synthesizer) cannot starve the
      # agent's MCP sidecars during a demo investigation.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: k8s-agent
            topologyKey: kubernetes.io/hostname
            namespaces: ["k8s-agent"]
      containers:
        - name: synth
          image: ${SYNTHESIZER_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: SCENARIO
              value: healthy
            - name: RPS
              value: "15"
            - name: WORKERS
              value: "32"
            - name: OTLP_ENDPOINT
              value: http://localhost:4317
            - name: ENABLE_CW
              value: "true"           # CloudWatch metrics on (step 4 onwards)
            - name: AWS_REGION
              value: us-east-1
            - name: CW_NAMESPACE
              value: RetailProd/Services
            - name: ENABLE_CPU_BURN
              value: "true"   # burns real CPU on paymentservice during spike so stress-ng throttling is observable
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
        - name: adot-collector
          image: public.ecr.aws/aws-observability/aws-otel-collector:latest
          imagePullPolicy: IfNotPresent
          # Sidecar inherits the pod's ServiceAccount (latency-synthesizer),
          # whose IRSA role grants both PutMetricData and X-Ray write.
          args: ["--config=/etc/otel/collector.yaml"]
          env:
            - name: AWS_REGION
              value: us-east-1
          ports:
            - containerPort: 4317
              name: otlp-grpc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: collector-config
              mountPath: /etc/otel
              readOnly: true
      volumes:
        - name: collector-config
          configMap:
            name: adot-collector-config
            items:
              - key: collector.yaml
                path: collector.yaml
