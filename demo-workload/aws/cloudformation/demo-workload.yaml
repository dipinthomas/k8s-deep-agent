AWSTemplateFormatVersion: '2010-09-09'
Description: >
  retail-prod demo workload — IRSA roles for the latency synthesizer and
  ADOT collector sidecar, X-Ray 100% sampling rule, CloudWatch alarm on
  checkoutservice p99 latency, SNS topic, alarm-to-agent Lambda + DLQ,
  and (optionally) AWS Chatbot Slack channel config.

  Covers steps 1-8 of DEMO_WORKLOAD_PLAN.md. Noisy-neighbor pod (step 9)
  and real-CPU mode (step 10) are k8s-only / synth-only — not in this
  stack.

  Depends on the cluster CFN stack for the OIDC provider URL.

Parameters:
  ClusterStackName:
    Type: String
    Default: k8s-agent-cluster
    Description: >
      Name of the cluster CFN stack (cluster.yaml). Used to import the OIDC
      provider URL for IRSA trust policies.

  Namespace:
    Type: String
    Default: shop-prod
    Description: Kubernetes namespace where the demo workload runs.

  SynthesizerServiceAccount:
    Type: String
    Default: latency-synthesizer

  CollectorServiceAccount:
    Type: String
    Default: adot-collector

  CwMetricNamespace:
    Type: String
    Default: RetailProd/Services

  AgentUrl:
    Type: String
    Description: >
      Full URL of the agent's /trigger endpoint, e.g.
      http://k8s-agent-lb-xyz.us-east-1.elb.amazonaws.com:8080/trigger
      Resolved by deploy-aws.sh from `kubectl get svc k8s-agent`.

  AlarmThresholdMs:
    Type: Number
    Default: 300
    Description: checkoutservice p99 latency threshold in milliseconds.

  AlarmEvaluationPeriods:
    Type: Number
    Default: 2
    Description: Number of consecutive periods that must breach to fire.

  AlarmPeriodSeconds:
    Type: Number
    Default: 30
    Description: Period in seconds for each evaluation.

  SlackWorkspaceId:
    Type: String
    Default: ''
    Description: >
      AWS Chatbot Slack workspace ID (Txxxxxxxx). Leave empty to skip
      Chatbot setup — useful for steps 4-7 before Slack auth is done.
      One-time workspace authorization is a manual console step (see
      aws/chatbot-config.md).

  SlackChannelId:
    Type: String
    Default: ''
    Description: Slack channel ID (Cxxxxxxxx). Required if SlackWorkspaceId is set.

  ChatbotConfigVersion:
    Type: String
    Default: 'v1'
    Description: >
      Increment (v2, v3, …) to force-recreate the Chatbot channel configuration.
      Chatbot threads all state-changes for an alarm under its first message;
      recreation clears that thread memory so the next alarm posts a fresh
      top-level card. Change this before each demo run if you need a clean slate.

Conditions:
  EnableChatbot: !Not [!Equals [!Ref SlackWorkspaceId, '']]

Resources:

  # -------------------------------------------------------------------------
  # IRSA: synthesizer pod -> cloudwatch:PutMetricData scoped to our namespace
  # -------------------------------------------------------------------------
  SynthesizerIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: retail-prod-latency-synthesizer
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Federated": "${OidcArn}"},
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcKey}:sub": "system:serviceaccount:${Namespace}:${SynthesizerServiceAccount}",
                    "${OidcKey}:aud": "sts.amazonaws.com"
                  }
                }
              }]
            }
          - OidcArn:
              Fn::ImportValue: !Sub '${ClusterStackName}-OidcProviderArn'
            OidcKey:
              Fn::Select:
                - 1
                - Fn::Split:
                    - 'https://'
                    - Fn::ImportValue: !Sub '${ClusterStackName}-OidcIssuerUrl'
      # Sidecar collector inherits this pod's SA, so the synthesizer role
      # also needs X-Ray write. CollectorIrsaRole is kept for the future
      # case where the collector runs as its own pod / DaemonSet.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: put-metric-data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: !Ref CwMetricNamespace

  # -------------------------------------------------------------------------
  # IRSA: ADOT collector standalone (reserved for future split-pod deploy)
  # -------------------------------------------------------------------------
  CollectorIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: retail-prod-adot-collector
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Federated": "${OidcArn}"},
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcKey}:sub": "system:serviceaccount:${Namespace}:${CollectorServiceAccount}",
                    "${OidcKey}:aud": "sts.amazonaws.com"
                  }
                }
              }]
            }
          - OidcArn:
              Fn::ImportValue: !Sub '${ClusterStackName}-OidcProviderArn'
            OidcKey:
              Fn::Select:
                - 1
                - Fn::Split:
                    - 'https://'
                    - Fn::ImportValue: !Sub '${ClusterStackName}-OidcIssuerUrl'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess

  # -------------------------------------------------------------------------
  # X-Ray sampling rule: 100% of traces from our *service services
  # -------------------------------------------------------------------------
  SamplingRule100Pct:
    Type: AWS::XRay::SamplingRule
    Properties:
      SamplingRule:
        RuleName: retail-prod-services-100pct
        ResourceARN: '*'
        Priority: 100
        FixedRate: 1.0
        ReservoirSize: 100
        ServiceName: '*service'
        ServiceType: '*'
        Host: '*'
        HTTPMethod: '*'
        URLPath: '*'
        Version: 1

  # -------------------------------------------------------------------------
  # SNS topic — fan-out point from CloudWatch alarm to Lambda + Chatbot
  # -------------------------------------------------------------------------
  IncidentsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: retail-prod-incidents
      DisplayName: Retail Prod Incidents
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  # CloudWatch needs explicit permission to publish.
  IncidentsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref IncidentsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudWatchAlarms
            Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref IncidentsTopic
            Condition:
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId

  # -------------------------------------------------------------------------
  # CloudWatch alarm: checkoutservice p99 latency > 300ms (configurable)
  # -------------------------------------------------------------------------
  CheckoutP99LatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: checkoutservice-p99-latency-high
      AlarmDescription: !Sub 'checkoutservice p99 latency exceeded ${AlarmThresholdMs}ms'
      Namespace: !Ref CwMetricNamespace
      MetricName: LatencyP99
      Dimensions:
        - Name: Service
          Value: checkoutservice
      Statistic: Average
      Period: !Ref AlarmPeriodSeconds
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Ref AlarmThresholdMs
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref IncidentsTopic
      OKActions:
        - !Ref IncidentsTopic

  # -------------------------------------------------------------------------
  # Lambda DLQ for failed alarm-to-agent deliveries
  # -------------------------------------------------------------------------
  AlarmToAgentDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: retail-prod-alarm-to-agent-dlq
      MessageRetentionPeriod: 1209600   # 14 days
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  # -------------------------------------------------------------------------
  # Lambda role: basic execution + DLQ write
  # -------------------------------------------------------------------------
  AlarmToAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: retail-prod-alarm-to-agent
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: dlq-write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt AlarmToAgentDLQ.Arn

  # -------------------------------------------------------------------------
  # Lambda: SNS -> POST agent /trigger
  # Code is inlined by deploy-aws.sh (which substitutes aws/lambda/handler.py
  # into the LAMBDA_HANDLER_PLACEHOLDER marker via Python string replacement
  # before `aws cloudformation deploy`).
  # -------------------------------------------------------------------------
  AlarmToAgentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: retail-prod-alarm-to-agent
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt AlarmToAgentRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          AGENT_URL: !Ref AgentUrl
          DELAY_SECONDS: "5"
      DeadLetterConfig:
        TargetArn: !GetAtt AlarmToAgentDLQ.Arn
      Code:
        ZipFile: |
          # LAMBDA_HANDLER_PLACEHOLDER
          # deploy-aws.sh replaces this placeholder with aws/lambda/handler.py
          # contents before running `aws cloudformation deploy`.
          def handler(event, context):
              raise RuntimeError("Lambda code not inlined — re-run deploy-aws.sh")

  AlarmToAgentSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref IncidentsTopic
      Protocol: lambda
      Endpoint: !GetAtt AlarmToAgentLambda.Arn

  AlarmToAgentInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AlarmToAgentLambda
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref IncidentsTopic

  # -------------------------------------------------------------------------
  # AWS Chatbot — Slack channel that receives SNS alarm cards.
  # Conditional on SlackWorkspaceId being set. Slack workspace authorization
  # is a one-time manual console step; see aws/chatbot-config.md.
  # -------------------------------------------------------------------------
  ChatbotRole:
    Type: AWS::IAM::Role
    Condition: EnableChatbot
    Properties:
      RoleName: retail-prod-chatbot
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: chatbot.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        - arn:aws:iam::aws:policy/AWSResourceExplorerReadOnlyAccess

  ChatbotChannel:
    Type: AWS::Chatbot::SlackChannelConfiguration
    Condition: EnableChatbot
    Properties:
      ConfigurationName: !Sub 'retail-prod-${ChatbotConfigVersion}'
      SlackWorkspaceId: !Ref SlackWorkspaceId
      SlackChannelId: !Ref SlackChannelId
      IamRoleArn: !GetAtt ChatbotRole.Arn
      SnsTopicArns:
        - !Ref IncidentsTopic
      LoggingLevel: INFO

Outputs:
  SynthesizerIrsaRoleArn:
    Value: !GetAtt SynthesizerIrsaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SynthesizerIrsaRoleArn'
  CollectorIrsaRoleArn:
    Value: !GetAtt CollectorIrsaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CollectorIrsaRoleArn'
  Namespace:
    Value: !Ref Namespace
    Export:
      Name: !Sub '${AWS::StackName}-Namespace'
  IncidentsTopicArn:
    Value: !Ref IncidentsTopic
    Export:
      Name: !Sub '${AWS::StackName}-IncidentsTopicArn'
  AlarmName:
    Value: !Ref CheckoutP99LatencyAlarm
    Export:
      Name: !Sub '${AWS::StackName}-AlarmName'
  AlarmToAgentLambdaArn:
    Value: !GetAtt AlarmToAgentLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AlarmToAgentLambdaArn'
  AlarmToAgentDLQUrl:
    Value: !Ref AlarmToAgentDLQ
    Export:
      Name: !Sub '${AWS::StackName}-AlarmToAgentDLQUrl'
