# Helm values for OpenTelemetry Demo v0.40.7
# Customised for the NZ Tech Rally disk pressure demo scenario

# ── Application components ─────────────────────────────────────────────────────
components:
  # image-provider: verbose nginx logging pre-enabled for fault injection demo
  image-provider:
    enabled: true
    useDefault:
      env: true
    env:
      - name: IMAGE_PROVIDER_PORT
        value: "8081"
      - name: OTEL_COLLECTOR_PORT_GRPC
        value: "4317"
      - name: OTEL_COLLECTOR_HOST
        value: $(OTEL_COLLECTOR_NAME)
      - name: NGINX_LOG_LEVEL
        value: "warn"          # fault-injection/trigger-disk-pressure.sh flips this to debug
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

  # load-generator: start with low traffic, fault injection cranks it up
  load-generator:
    enabled: true
    useDefault:
      env: true
    env:
      - name: LOCUST_WEB_HOST
        value: "0.0.0.0"
      - name: LOCUST_USERS
        value: "10"
      - name: LOCUST_SPAWN_RATE
        value: "1"
      - name: LOCUST_HOST
        value: http://frontend-proxy:8080
      - name: LOCUST_HEADLESS
        value: "false"
      - name: LOCUST_AUTOSTART
        value: "true"
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python

  checkout:
    enabled: true
    useDefault:
      env: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  payment:
    enabled: true
    useDefault:
      env: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  cart:
    enabled: true
    useDefault:
      env: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  frontend:
    enabled: true
    useDefault:
      env: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  ad:
    enabled: true
    useDefault:
      env: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

  recommendation:
    enabled: true
    useDefault:
      env: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  # flagd not needed for demo
  flagd:
    enabled: false
  # postgresql IS needed — product-catalog uses it as backing store
  postgresql:
    enabled: true
