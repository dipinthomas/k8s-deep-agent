# K8s AI Agent — deployment, RBAC, and service account
# Apply with: kubectl apply -f infra/agent-deployment.yaml
# Requires: infra/agent-secrets.yaml applied first (see agent-secrets.example.yaml)

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-agent
  namespace: k8s-agent
  annotations:
    # IRSA: grants the agent pod AWS credentials via the k8s-agent-irsa IAM role.
    # Role is created by infra/setup-agent-irsa.sh — run that before deploying.
    eks.amazonaws.com/role-arn: arn:aws:iam::637039075925:role/k8s-agent-irsa

---
# Namespace-scoped permissions: full pod/log/event access in otel-demo
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-agent-role
  namespace: k8s-agent
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-agent-binding
  namespace: k8s-agent
subjects:
- kind: ServiceAccount
  name: k8s-agent
  namespace: k8s-agent
roleRef:
  kind: Role
  name: k8s-agent-role
  apiGroup: rbac.authorization.k8s.io

---
# Cluster-wide: full read/write access — agent investigates and remediates across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-cluster-role
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-cluster-binding
subjects:
- kind: ServiceAccount
  name: k8s-agent
  namespace: k8s-agent
roleRef:
  kind: ClusterRole
  name: k8s-agent-cluster-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-agent
  namespace: k8s-agent
  labels:
    app: k8s-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-agent
  template:
    metadata:
      labels:
        app: k8s-agent
      annotations:
        # Karpenter (EKS Auto) tries to consolidate underutilized nodes by
        # evicting pods. Mid-investigation, this kills the agent pod and
        # forces a Redis recovery. Block consolidation/disruption for the
        # agent — it must run uninterrupted while a Slack approval is
        # outstanding.
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: k8s-agent
      containers:
      - name: agent
        image: dipinthomas2003/k8s-deep-agent:v45
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: k8s-agent-secrets
        env:
        - name: AWS_REGION
          value: "us-east-1"
        - name: CLUSTER_NAME
          value: "otel-demo-prod"
        - name: AGENT_MODEL
          value: "openai:gpt-5.4-mini"
        - name: LOG_LEVEL
          value: "INFO"
        # Cluster-specific skill injected at deploy time — change this to switch clusters.
        # Must point to a SKILL.md under skills/clusters/<name>/.
        - name: CLUSTER_SKILL_PATH
          value: "./skills/clusters/retail-prod-eks-use1/SKILL.md"
        # Cost / quality knobs (rollback of v35 over-aggressive defaults — Apr 2026):
        #   TOOL_OUTPUT_CHAR_LIMIT was 8000 by default in optimization.py and
        #   was truncating real kubectl output mid-list, hiding the pod the
        #   agent needed and pushing it into a CloudWatch fixation loop.
        #   Effectively disable truncation until we have a smarter strategy
        #   (e.g. truncate only on history replay, not first-read).
        - name: TOOL_OUTPUT_CHAR_LIMIT
          value: "999999999"
        #   Subagent run-cap was 6, which terminated subagents before they
        #   could finish a real investigation. 15 gives headroom without
        #   permitting unbounded loops.
        - name: SUBAGENT_MODEL_CALL_LIMIT
          value: "15"
        #   Output token cap restored to the pre-v35 default. 2048 was
        #   chopping legitimate enumerate-and-propose turns mid-tool-call.
        - name: ANTHROPIC_MAX_TOKENS
          value: "8192"
        # MCP sidecar URLs — sidecars run in the same pod so we use localhost.
        - name: KUBECTL_MCP_URL
          value: "http://localhost:3001/mcp"
        - name: CLOUDWATCH_MCP_URL
          value: "http://localhost:3002/mcp"
        # Redis memory store — persists incident history across agent pod restarts.
        - name: REDIS_URL
          value: "redis://agent-redis.k8s-agent.svc.cluster.local:6379"
        # IRSA: EKS automatically injects these two vars into pods whose
        # ServiceAccount has the eks.amazonaws.com/role-arn annotation.
        # The AWS SDK (boto3) picks them up via the default credential chain.
        # AWS_ROLE_ARN            — injected by EKS
        # AWS_WEB_IDENTITY_TOKEN_FILE — injected by EKS
        ports:
        - containerPort: 8080
          name: http-trigger
        # Startup probe: wait up to ~150s for MCP sidecars + agent bootstrap before
        # liveness kicks in. Without this, the kubelet would kill the pod mid-boot.
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 30
          failureThreshold: 5
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

      # ── MCP sidecars ──────────────────────────────────────────────────────────
      # Running in the same pod so the agent connects via localhost — no network hop.
      # The k8s-agent ServiceAccount provides both K8s RBAC and IRSA credentials.

      - name: kubectl-mcp
        image: dipinthomas2003/k8s-mcp-gateway:v2
        command: ["supergateway"]
        args:
        - "--stdio"
        - "mcp-server-kubernetes"
        - "--port"
        - "3001"
        - "--outputTransport"
        - "streamableHttp"
        - "--stateful"
        - "--healthEndpoint"
        - "/healthz"
        ports:
        - containerPort: 3001
          name: kubectl-mcp
        # Bumped from 128Mi/512Mi after 512Mi OOMKill under sustained
        # investigation traffic. Matches cloudwatch-mcp profile.
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 5

      - name: cloudwatch-mcp
        image: dipinthomas2003/k8s-mcp-gateway:v2
        command: ["supergateway"]
        args:
        - "--stdio"
        - "uvx awslabs.cloudwatch-mcp-server@latest"
        - "--port"
        - "3002"
        - "--outputTransport"
        - "streamableHttp"
        - "--stateful"
        - "--healthEndpoint"
        - "/healthz"
        ports:
        - containerPort: 3002
          name: cloudwatch-mcp
        env:
        - name: AWS_REGION
          value: "us-east-1"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 5

      priorityClassName: infrastructure

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-agent
  namespace: k8s-agent
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: k8s-agent
  ports:
    - port: 8080
      targetPort: 8080
      name: http-trigger

# Cross-namespace access into otel-demo is already granted by the cluster-wide
# ClusterRoleBinding above (apiGroups/resources/verbs all *). Per-namespace
# bindings would only add value if we tightened cluster scope; for now the
# cluster-admin binding is sufficient and avoids a hard dependency on the
# otel-demo namespace existing at agent deploy time.
