# Agent secrets template
# 1. Copy this file: cp infra/agent-secrets.example.yaml infra/agent-secrets.yaml
# 2. Fill in all values below
# 3. Apply: kubectl apply -f infra/agent-secrets.yaml
# 4. DO NOT commit agent-secrets.yaml — it is in .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: k8s-agent-secrets
  namespace: k8s-agent
type: Opaque
stringData:
  # Anthropic
  ANTHROPIC_API_KEY: "sk-ant-..."

  # Slack — from your Slack app settings (see slack/bot-setup.md)
  SLACK_BOT_TOKEN: "xoxb-..."
  SLACK_APP_TOKEN: "xapp-..."
  SLACK_SIGNING_SECRET: "..."
  SLACK_TEAM_ID: "T..."
  SLACK_CHANNEL_ID: "C..."

  # Slack incoming webhook — used by trigger-noisy-neighbor.sh to post alerts.
  # Must be a DIFFERENT identity from the bot (webhook posts appear as the app,
  # not the bot user, so the bot receives them via Socket Mode).
  # Get it: api.slack.com/apps → your app → Incoming Webhooks → Add New Webhook
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/..."

  # AWS — leave empty if using IRSA (EKS injects credentials automatically)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # LangSmith (optional — recommended for debugging agent traces)
  LANGSMITH_API_KEY: ""

# NOTE: Non-secret env vars (CLUSTER_SKILL_PATH, KUBECTL_MCP_URL,
# CLOUDWATCH_MCP_URL, REDIS_URL) are in agent-deployment.yaml, not here.
# Only CLUSTER_SKILL_PATH needs to change when deploying to a different cluster.
