# Agent secrets template
# 1. Copy this file: cp infra/agent-secrets.example.yaml infra/agent-secrets.yaml
# 2. Fill in all values below
# 3. Apply: kubectl apply -f infra/agent-secrets.yaml
# 4. DO NOT commit agent-secrets.yaml — it is in .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: k8s-agent-secrets
  namespace: otel-demo
type: Opaque
stringData:
  # Anthropic
  ANTHROPIC_API_KEY: "sk-ant-..."

  # Slack — from your Slack app settings (see slack/bot-setup.md)
  SLACK_BOT_TOKEN: "xoxb-..."
  SLACK_APP_TOKEN: "xapp-..."
  SLACK_SIGNING_SECRET: "..."
  SLACK_TEAM_ID: "T..."
  SLACK_CHANNEL_ID: "C..."

  # AWS — leave empty if using an IAM role attached to the EKS node/pod identity
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
