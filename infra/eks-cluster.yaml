apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: otel-demo-prod
  region: ap-southeast-2
  version: "1.33"
  tags:
    project: nz-tech-rally-demo
    owner: dipin

iam:
  withOIDC: true

# EKS Auto Mode — nodes are provisioned automatically on demand,
# scaled to zero when idle, no fixed node group cost
autoModeConfig:
  enabled: true
  nodePools:
    - general-purpose
    - system

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: amazon-cloudwatch-observability
    version: latest
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
