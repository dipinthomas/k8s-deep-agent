# Arize Phoenix — self-hosted observability server
#
# Exposes the Phoenix UI (port 6006) and the OTLP HTTP collector endpoint
# that the agent posts traces to. Deployed in the k8s-agent namespace so
# the agent pod reaches it via cluster-local DNS:
#   http://phoenix.k8s-agent.svc.cluster.local:6006/v1/traces
#
# Apply:
#   kubectl apply -f infra/phoenix-deployment.yaml
#
# Then enable tracing in the agent secret/env:
#   PHOENIX_ENABLED=true
#   PHOENIX_COLLECTOR_ENDPOINT=http://phoenix.k8s-agent.svc.cluster.local:6006/v1/traces
#
# Access the UI via port-forward (no ingress needed for a demo):
#   kubectl port-forward -n k8s-agent svc/phoenix 6006:6006
#   open http://localhost:6006

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: phoenix-data
  namespace: k8s-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Uses the default EKS storage class (gp2/gp3 via EBS CSI driver).
  # Set storageClassName explicitly if your cluster uses a different class.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: k8s-agent
  labels:
    app: phoenix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
      - name: phoenix
        image: arizephoenix/phoenix:latest
        ports:
        - containerPort: 6006
          name: ui-otlp-http
        - containerPort: 4317
          name: otlp-grpc
        env:
        - name: PHOENIX_WORKING_DIR
          value: /mnt/data
        volumeMounts:
        - name: data
          mountPath: /mnt/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 6006
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: phoenix-data
      priorityClassName: infrastructure

---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: k8s-agent
spec:
  selector:
    app: phoenix
  ports:
  - name: ui-otlp-http
    port: 6006
    targetPort: 6006
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
