# Arize Phoenix — self-hosted observability server
#
# Exposes the Phoenix UI (port 6006) and the OTLP HTTP collector endpoint
# that the agent posts traces to. Deployed in the k8s-agent namespace so
# the agent pod reaches it via cluster-local DNS:
#   http://phoenix.k8s-agent.svc.cluster.local:6006/v1/traces
#
# Storage: emptyDir — traces live for the lifetime of the pod.
# Fine for demos. For persistent traces across restarts, provision an EBS
# volume manually and switch to a PVC backed by the cluster's CSI driver.
#
# Apply:
#   kubectl apply -f infra/phoenix-deployment.yaml
#
# Access the UI (public NLB — provisioned automatically):
#   kubectl get svc phoenix -n k8s-agent   # shows the external hostname

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: k8s-agent
  labels:
    app: phoenix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
      - name: phoenix
        image: arizephoenix/phoenix:latest
        ports:
        - containerPort: 6006
          name: ui-otlp-http
        - containerPort: 4317
          name: otlp-grpc
        env:
        - name: PHOENIX_WORKING_DIR
          value: /mnt/data
        - name: PHOENIX_PORT
          value: "6006"
        volumeMounts:
        - name: data
          mountPath: /mnt/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 6006
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: data
        emptyDir: {}
      priorityClassName: infrastructure

---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: k8s-agent
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: phoenix
  ports:
  - name: ui-otlp-http
    port: 6006
    targetPort: 6006
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
