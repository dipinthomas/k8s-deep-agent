# MCP server definitions
#
# NOTE: The agent currently uses direct Python tool implementations in agent/tools/.
# These MCP server definitions are provided for reference if you want to swap to
# an MCP-based tool layer in future.
#
# Correct startup commands:
#   npx mcp-server-kubernetes                     (stdio transport)
#   uvx awslabs.cloudwatch-mcp-server@latest      (stdio transport, Python/uvx)
#   npx @modelcontextprotocol/server-slack        (stdio transport)

servers:
  kubectl-mcp:
    command: npx
    args:
      - "mcp-server-kubernetes"
    env:
      KUBECONFIG: "${KUBECONFIG}"
    description: "Kubernetes cluster operations via kubectl"

  cloudwatch-mcp:
    command: uvx
    args:
      - "awslabs.cloudwatch-mcp-server@latest"
    env:
      AWS_REGION: "${AWS_REGION:-ap-southeast-2}"
      AWS_PROFILE: "${AWS_PROFILE:-default}"
    description: "AWS CloudWatch metrics, logs Insights, and alarms"

  slack-mcp:
    command: npx
    args:
      - "@modelcontextprotocol/server-slack"
    env:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_TEAM_ID: "${SLACK_TEAM_ID}"
    description: "Slack posting and message reading"
