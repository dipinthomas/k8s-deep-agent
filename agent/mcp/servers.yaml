# MCP server definitions
# Start each server before running the agent:
#   npx @modelcontextprotocol/server-kubernetes --port 3001
#   npx @modelcontextprotocol/server-aws-cloudwatch --port 3002
#   npx @modelcontextprotocol/server-slack --port 3003

servers:
  kubectl-mcp:
    command: npx
    args:
      - "@modelcontextprotocol/server-kubernetes"
      - "--port"
      - "${KUBECTL_MCP_PORT:-3001}"
    env:
      KUBECONFIG: "${KUBECONFIG}"
    description: "Kubernetes cluster operations via kubectl"

  cloudwatch-mcp:
    command: npx
    args:
      - "@modelcontextprotocol/server-aws-cloudwatch"
      - "--port"
      - "${CLOUDWATCH_MCP_PORT:-3002}"
    env:
      AWS_REGION: "${AWS_REGION:-ap-southeast-2}"
      AWS_PROFILE: "${AWS_PROFILE:-default}"
    description: "AWS CloudWatch metrics, logs Insights, and alarms"

  slack-mcp:
    command: npx
    args:
      - "@modelcontextprotocol/server-slack"
      - "--port"
      - "${SLACK_MCP_PORT:-3003}"
    env:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_TEAM_ID: "${SLACK_TEAM_ID}"
    description: "Slack posting and message reading"
